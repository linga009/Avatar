services:
  train:
    build: .
    runtime: nvidia
    init: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8420:8420"
    volumes:
      - ./data:/app/data
    environment:
      - JAX_PLATFORMS=cuda
      - XLA_PYTHON_CLIENT_PREALLOCATE=false
      - XLA_PYTHON_CLIENT_MEM_FRACTION=0.85
      - TF_GPU_ALLOCATOR=cuda_malloc_async
      - HF_HOME=/app/data/model_cache
